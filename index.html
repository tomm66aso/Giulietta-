<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wayfarer — Your World, Your Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'DM Sans',sans-serif;background:#1a1612;overflow:hidden}
:root{
  --cream:#f5f0e8;--ink:#1a1612;--ink-soft:#4a3f35;
  --gold:#c9a84c;--gold-light:#e8d5a3;
  --visited-c:#2d6a4f;--visited-l:#52b788;
  --lived-c:#9b2226;--lived-l:#e63946;
  --wish-c:#1d3557;--wish-l:#457b9d;
  --shadow:0 8px 40px rgba(26,22,18,.2);
  --tr:.28s cubic-bezier(.4,0,.2,1);--hdr:56px;
}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .8s ease,visibility .8s ease;
}
#splash.hide{opacity:0;visibility:hidden}
.s-star{color:var(--gold);font-size:32px;display:inline-block;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.s-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(30px,7vw,56px);font-weight:700;
  color:var(--cream);text-align:center;line-height:1.15;letter-spacing:-.5px;
}
.s-title em{color:var(--gold);font-style:italic}
.s-heart{font-size:26px;animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.s-sub{font-size:12px;color:rgba(245,240,232,.38);letter-spacing:.6px;text-transform:uppercase}

/* HEADER */
.hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:1000;
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;
  background:rgba(245,240,232,.94);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(201,168,76,.22);
  box-shadow:0 1px 12px rgba(26,22,18,.08);
}
.logo{display:flex;align-items:center;gap:8px}
.logo-star{color:var(--gold);font-size:15px;display:inline-block;animation:spin 9s linear infinite}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.nav{display:flex;gap:8px;align-items:center}
.btn-g{background:none;border:1px solid rgba(26,22,18,.18);padding:7px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink-soft);transition:var(--tr)}
.btn-g:hover{border-color:var(--gold);color:var(--gold)}
.btn-p{background:var(--ink);color:var(--cream);border:none;padding:7px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr)}
.btn-p:hover{background:var(--gold)}

/* MAP */
#map{position:fixed;top:var(--hdr);left:0;right:0;bottom:0;z-index:0}
.leaflet-tile-pane{filter:sepia(20%) saturate(.9) brightness(.97)}

/* LEGEND */
.legend{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:800;
  display:flex;gap:4px;
  background:rgba(245,240,232,.93);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:7px 14px;border-radius:100px;
  border:1px solid rgba(201,168,76,.25);box-shadow:0 4px 20px rgba(26,22,18,.14);
}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--ink-soft);padding:4px 9px;border-radius:100px;cursor:pointer;transition:var(--tr);user-select:none}
.leg-item:hover,.leg-item.active{background:var(--ink);color:var(--cream)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-all{background:var(--gold)}.d-vis{background:var(--visited-l)}.d-liv{background:var(--lived-l)}.d-wis{background:var(--wish-l)}

/* PANEL */
.panel{
  position:fixed;top:var(--hdr);right:0;bottom:0;width:320px;z-index:700;
  background:rgba(245,240,232,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-left:1px solid rgba(201,168,76,.2);padding:24px;overflow-y:auto;
  transform:translateX(100%);transition:transform var(--tr);
  box-shadow:-6px 0 30px rgba(26,22,18,.1);
}
.panel.open{transform:translateX(0)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.ptitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
.pclose{background:none;border:none;font-size:14px;cursor:pointer;color:var(--ink-soft);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.pclose:hover{background:rgba(26,22,18,.08)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.scard{background:#fff;border-radius:11px;padding:16px 14px;border:1px solid rgba(201,168,76,.15);text-align:center}
.snum{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);line-height:1}
.slbl{font-size:10px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.plist{display:flex;flex-direction:column;gap:7px}
.pitem{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#fff;border-radius:9px;border:1px solid rgba(201,168,76,.1);cursor:pointer;transition:var(--tr);animation:sIn .3s ease both}
@keyframes sIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.pitem:hover{border-color:var(--gold);transform:translateX(-2px)}
.psdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pcity{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcountry{font-size:10px;color:var(--ink-soft);margin-top:1px}
.pdel{background:none;border:none;font-size:11px;cursor:pointer;color:transparent;transition:var(--tr);padding:3px}
.pitem:hover .pdel{color:#c0392b}

/* MODAL */
.mo{position:fixed;inset:0;z-index:2000;background:rgba(26,22,18,.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--tr)}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--cream);border-radius:20px;padding:28px;width:420px;max-width:calc(100vw - 24px);box-shadow:var(--shadow);transform:translateY(18px) scale(.97);transition:transform var(--tr);max-height:calc(100vh - 60px);overflow-y:auto}
.mo.open .modal{transform:translateY(0) scale(1)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--ink)}
.mclose{background:none;border:none;font-size:14px;cursor:pointer;color:var(--ink-soft);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.mclose:hover{background:rgba(26,22,18,.08)}

/* SEARCH */
.sw{position:relative;margin-bottom:14px}
.cinput{width:100%;padding:11px 15px;border:2px solid rgba(26,22,18,.12);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:var(--ink);outline:none;transition:border-color var(--tr);-webkit-appearance:none}
.cinput:focus{border-color:var(--gold)}
.cinput::placeholder{color:rgba(74,63,53,.42)}
.sresults{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:10px;box-shadow:var(--shadow);z-index:100;max-height:200px;overflow-y:auto;border:1px solid rgba(201,168,76,.2);display:none}
.sitem{padding:11px 15px;cursor:pointer;border-bottom:1px solid rgba(26,22,18,.05);transition:background var(--tr)}
.sitem:last-child{border-bottom:none}
.sitem:hover{background:var(--gold-light)}
.rcity{font-size:13px;font-weight:500;color:var(--ink)}
.rcountry{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* SELECTED */
.selp{display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid var(--gold);border-radius:12px;padding:11px 15px;margin-bottom:14px;animation:pIn .22s ease}
@keyframes pIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.selcity{font-size:15px;font-weight:600;color:var(--ink)}
.selcountry{font-size:11px;color:var(--ink-soft);margin-top:2px}
.clrsel{background:none;border:none;font-size:13px;cursor:pointer;color:var(--ink-soft);transition:var(--tr);padding:3px}
.clrsel:hover{color:var(--lived-l)}

/* STATUS */
.pkl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:9px}
.sopts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sopt{display:flex;flex-direction:column;align-items:center;padding:13px 6px;border-radius:11px;border:2px solid rgba(26,22,18,.1);cursor:pointer;transition:var(--tr);background:#fff;text-align:center}
.sopt input[type="radio"]{display:none}
.sopt:hover{border-color:var(--gold)}
.sopt.sel-visited{border-color:var(--visited-c);background:rgba(45,106,79,.08)}
.sopt.sel-lived{border-color:var(--lived-c);background:rgba(155,34,38,.08)}
.sopt.sel-wishlist{border-color:var(--wish-c);background:rgba(29,53,87,.08)}
.sicon{font-size:20px;margin-bottom:5px}
.sname{font-size:11px;font-weight:600;color:var(--ink)}
.sdesc{font-size:9px;color:var(--ink-soft);margin-top:2px}

/* NOTES */
.nwrap{margin-bottom:18px}
.notein{width:100%;height:64px;padding:9px 13px;border:2px solid rgba(26,22,18,.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);background:#fff;resize:none;outline:none;transition:border-color var(--tr);-webkit-appearance:none}
.notein:focus{border-color:var(--gold)}
.notein::placeholder{color:rgba(74,63,53,.38);font-style:italic}

/* SAVE */
.bsave{width:100%;padding:13px;background:var(--ink);color:var(--cream);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:var(--tr);letter-spacing:.2px}
.bsave:hover{background:var(--gold)}
.bsave:active{transform:scale(.98)}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--cream);padding:9px 20px;border-radius:100px;font-size:12px;font-weight:500;z-index:9000;opacity:0;transition:all .28s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEAFLET CUSTOM */
.cmark{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.mv{background:var(--visited-l)}.ml{background:var(--lived-l)}.mw{background:var(--wish-l)}
.leaflet-popup-content-wrapper{background:var(--cream);border-radius:11px;box-shadow:var(--shadow);border:1px solid rgba(201,168,76,.2);font-family:'DM Sans',sans-serif}
.leaflet-popup-tip{background:var(--cream)}
.popcity{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.popcountry{font-size:10px;color:var(--ink-soft)}
.popst{display:inline-block;margin-top:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:100px}
.pvis{background:rgba(82,183,136,.15);color:var(--visited-c)}
.pliv{background:rgba(230,57,70,.12);color:var(--lived-c)}
.pwis{background:rgba(69,123,157,.12);color:var(--wish-c)}
.popnote{margin-top:5px;font-size:10px;font-style:italic;color:var(--ink-soft);max-width:150px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:100px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <span class="s-star">✦</span>
  <div class="s-title">Pulce<br><em>ti amo</em></div>
  <div class="s-heart">❤️</div>
  <div class="s-sub">Wayfarer — il mondo è nostro</div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <span class="logo-star">✦</span>
    <span class="logo-text">Wayfarer</span>
  </div>
  <div class="nav">
    <button class="btn-g" id="btn-stats">Stats</button>
    <button class="btn-p" id="btn-add">+ Add Place</button>
  </div>
</header>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND -->
<div class="legend">
  <div class="leg-item active" data-f="all"><span class="leg-dot d-all"></span><span>All</span></div>
  <div class="leg-item" data-f="visited"><span class="leg-dot d-vis"></span><span>Visited</span></div>
  <div class="leg-item" data-f="lived"><span class="leg-dot d-liv"></span><span>Lived</span></div>
  <div class="leg-item" data-f="wishlist"><span class="leg-dot d-wis"></span><span>Wishlist</span></div>
</div>

<!-- STATS PANEL -->
<div class="panel" id="panel">
  <div class="ph">
    <h2 class="ptitle">Your World</h2>
    <button class="pclose" id="close-panel">✕</button>
  </div>
  <div class="sgrid">
    <div class="scard"><div class="snum" id="s-cities">0</div><div class="slbl">Cities</div></div>
    <div class="scard"><div class="snum" id="s-countries">0</div><div class="slbl">Countries</div></div>
    <div class="scard"><div class="snum" id="s-visited">0</div><div class="slbl">Visited</div></div>
    <div class="scard"><div class="snum" id="s-wish">0</div><div class="slbl">Wishlist</div></div>
  </div>
  <div class="plist" id="plist"></div>
</div>

<!-- MODAL -->
<div class="mo" id="mo">
  <div class="modal">
    <div class="mhdr">
      <h2 class="mtitle">Add a Place</h2>
      <button class="mclose" id="mclose">✕</button>
    </div>
    <div class="sw">
      <input type="text" id="cinput" class="cinput"
        placeholder="Cerca città… es. Tokyo, Roma, Parigi"
        autocomplete="off" autocorrect="off" spellcheck="false"/>
      <div class="sresults" id="sresults"></div>
    </div>
    <div class="selp" id="selp" style="display:none">
      <div>
        <div class="selcity" id="sel-city"></div>
        <div class="selcountry" id="sel-country"></div>
      </div>
      <button class="clrsel" id="clrsel">✕</button>
    </div>
    <p class="pkl">How do you know this place?</p>
    <div class="sopts">
      <label class="sopt" data-s="visited">
        <input type="radio" name="st" value="visited"/>
        <span class="sicon">🌍</span><span class="sname">Visited</span><span class="sdesc">Been there</span>
      </label>
      <label class="sopt" data-s="lived">
        <input type="radio" name="st" value="lived"/>
        <span class="sicon">🏠</span><span class="sname">Lived</span><span class="sdesc">Called home</span>
      </label>
      <label class="sopt" data-s="wishlist">
        <input type="radio" name="st" value="wishlist"/>
        <span class="sicon">⭐</span><span class="sname">Wishlist</span><span class="sdesc">Dream spot</span>
      </label>
    </div>
    <div class="nwrap">
      <textarea id="notes" class="notein" placeholder="Un ricordo, una sensazione… (opzionale)"></textarea>
    </div>
    <button class="bsave" id="bsave">Save Place</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LEAFLET — caricato DOPO il DOM -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  'use strict';

  /* SPLASH */
  var splash = document.getElementById('splash');
  setTimeout(function(){
    splash.classList.add('hide');
    setTimeout(function(){ splash.style.display='none'; }, 850);
  }, 3000);

  /* STATE */
  var places  = JSON.parse(localStorage.getItem('wf_places') || '[]');
  var sel     = null;
  var filter  = 'all';
  var markers = {};
  var stout   = null;

  /* MAP */
  var map = L.map('map', { center:[20,10], zoom:2, zoomControl:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    { attribution:'&copy; <a href="https://carto.com">CARTO</a>', maxZoom:19 }
  ).addTo(map);
  L.control.zoom({ position:'topright' }).addTo(map);

  /* HELPERS */
  function g(id){ return document.getElementById(id); }

  function save(){ localStorage.setItem('wf_places', JSON.stringify(places)); }

  function toast(msg){
    var t = g('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  function sColor(s){
    return ({visited:'#52b788', lived:'#e63946', wishlist:'#457b9d'})[s] || '#c9a84c';
  }

  function mkIcon(s){
    var cls = ({visited:'mv', lived:'ml', wishlist:'mw'})[s] || 'mv';
    return L.divIcon({
      className:'',
      html:'<div class="cmark '+cls+'"></div>',
      iconSize:[26,26], iconAnchor:[13,26], popupAnchor:[0,-30]
    });
  }

  /* MARKERS */
  function addMark(p){
    var m = L.marker([p.lat, p.lng], { icon:mkIcon(p.status) }).addTo(map);
    var sc = ({visited:'pvis', lived:'pliv', wishlist:'pwis'})[p.status] || 'pvis';
    m.bindPopup(
      '<div class="popcity">'+p.city+'</div>'+
      '<div class="popcountry">'+p.country+'</div>'+
      '<span class="popst '+sc+'">'+p.status+'</span>'+
      (p.notes ? '<div class="popnote">'+p.notes+'</div>' : '')
    );
    markers[p.id] = m;
  }

  function rmMark(id){
    if(markers[id]){ map.removeLayer(markers[id]); delete markers[id]; }
  }

  function refresh(){
    Object.keys(markers).forEach(function(id){ map.removeLayer(markers[id]); });
    markers = {};
    places.forEach(function(p){
      if(filter==='all' || p.status===filter) addMark(p);
    });
  }

  /* STATS */
  function stats(){
    var cnt = {};
    places.forEach(function(p){ cnt[p.country]=1; });
    g('s-cities').textContent    = places.length;
    g('s-countries').textContent = Object.keys(cnt).length;
    g('s-visited').textContent   = places.filter(function(p){ return p.status==='visited'||p.status==='lived'; }).length;
    g('s-wish').textContent      = places.filter(function(p){ return p.status==='wishlist'; }).length;
  }

  function renderList(){
    var pl = g('plist');
    pl.innerHTML = '';
    var arr = filter==='all' ? places : places.filter(function(p){ return p.status===filter; });
    if(!arr.length){
      pl.innerHTML='<p style="text-align:center;color:#9a8e84;font-size:12px;padding:18px 0;font-style:italic">No places yet…</p>';
      return;
    }
    arr.forEach(function(p, i){
      var d = document.createElement('div');
      d.className = 'pitem';
      d.style.animationDelay = (i*35)+'ms';
      d.innerHTML =
        '<span class="psdot" style="background:'+sColor(p.status)+'"></span>'+
        '<div class="pinfo"><div class="pcity">'+p.city+'</div>'+
        '<div class="pcountry">'+p.country+' · <em>'+p.status+'</em></div></div>'+
        '<button class="pdel" data-id="'+p.id+'">✕</button>';
      d.addEventListener('click', function(e){
        if(e.target.classList.contains('pdel')) return;
        map.flyTo([p.lat,p.lng], 8, {duration:1.2});
        if(markers[p.id]) markers[p.id].openPopup();
      });
      d.querySelector('.pdel').addEventListener('click', function(e){
        e.stopPropagation();
        places = places.filter(function(x){ return x.id!==p.id; });
        save(); rmMark(p.id); stats(); renderList();
        toast('Place removed');
      });
      pl.appendChild(d);
    });
  }

  /* FILTER */
  document.querySelectorAll('.leg-item').forEach(function(el){
    el.addEventListener('click', function(){
      document.querySelectorAll('.leg-item').forEach(function(x){ x.classList.remove('active'); });
      el.classList.add('active');
      filter = el.dataset.f;
      refresh(); renderList();
    });
  });

  /* MODAL */
  function openModal(){
    g('mo').classList.add('open');
    setTimeout(function(){ g('cinput').focus(); }, 200);
  }
  function closeModal(){
    g('mo').classList.remove('open');
    g('cinput').value=''; g('cinput').style.display='block';
    g('sresults').style.display='none';
    g('selp').style.display='none';
    sel=null; g('notes').value='';
    document.querySelectorAll('input[name="st"]').forEach(function(r){ r.checked=false; });
    document.querySelectorAll('.sopt').forEach(function(o){ o.className='sopt'; });
  }
  g('btn-add').addEventListener('click', openModal);
  g('mclose').addEventListener('click', closeModal);
  g('mo').addEventListener('click', function(e){ if(e.target===g('mo')) closeModal(); });

  /* PANEL */
  g('btn-stats').addEventListener('click', function(){ g('panel').classList.add('open'); stats(); renderList(); });
  g('close-panel').addEventListener('click', function(){ g('panel').classList.remove('open'); });

  /* SEARCH */
  g('cinput').addEventListener('input', function(){
    clearTimeout(stout);
    var q = g('cinput').value.trim();
    if(q.length<2){ g('sresults').style.display='none'; return; }
    stout = setTimeout(function(){ doSearch(q); }, 380);
  });
  document.addEventListener('click', function(e){
    if(!e.target.closest('.sw')) g('sresults').style.display='none';
  });
  g('clrsel').addEventListener('click', function(){
    sel=null; g('selp').style.display='none';
    g('cinput').style.display='block'; g('cinput').value=''; g('cinput').focus();
  });

  function doSearch(q){
    fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&addressdetails=1&accept-language=en')
      .then(function(r){ return r.json(); })
      .then(function(data){
        var sr = g('sresults');
        sr.innerHTML='';
        if(!data||!data.length){
          sr.innerHTML='<div class="sitem"><div class="rcity">Nessun risultato</div></div>';
          sr.style.display='block'; return;
        }
        data.slice(0,6).forEach(function(item){
          var a = item.address||{};
          var city    = a.city||a.town||a.village||a.municipality||a.suburb||item.display_name.split(',')[0];
          var state   = a.state||'';
          var country = a.country||'';
          var label   = state ? state+', '+country : country;
          var d = document.createElement('div');
          d.className = 'sitem';
          d.innerHTML = '<div class="rcity">'+city+'</div><div class="rcountry">'+label+'</div>';
          d.addEventListener('click', function(){
            sel = { city:city, country:country, state:state, lat:parseFloat(item.lat), lng:parseFloat(item.lon) };
            g('sel-city').textContent    = city;
            g('sel-country').textContent = label;
            g('selp').style.display      = 'flex';
            sr.style.display             = 'none';
            g('cinput').value            = '';
            g('cinput').style.display    = 'none';
          });
          sr.appendChild(d);
        });
        sr.style.display='block';
      })
      .catch(function(){
        g('sresults').innerHTML='<div class="sitem"><div class="rcity">Errore connessione</div></div>';
        g('sresults').style.display='block';
      });
  }

  /* STATUS CLICK */
  document.querySelectorAll('.sopt').forEach(function(opt){
    opt.addEventListener('click', function(){
      document.querySelectorAll('.sopt').forEach(function(o){ o.className='sopt'; });
      opt.className = 'sopt sel-'+opt.dataset.s;
      opt.querySelector('input').checked=true;
    });
  });

  /* SAVE */
  g('bsave').addEventListener('click', function(){
    if(!sel){ toast('Seleziona prima una città'); return; }
    var st = document.querySelector('input[name="st"]:checked');
    if(!st){ toast('Scegli uno status'); return; }
    if(places.some(function(p){ return p.city===sel.city&&p.country===sel.country; })){
      toast(sel.city+' è già sulla mappa!'); return;
    }
    var p = {
      id: Date.now()+'', city:sel.city, country:sel.country, state:sel.state||'',
      lat:sel.lat, lng:sel.lng, status:st.value,
      notes:g('notes').value.trim(), addedAt:new Date().toISOString()
    };
    places.push(p); save(); addMark(p); stats(); renderList();
    map.flyTo([p.lat,p.lng], 7, {duration:1.3});
    setTimeout(function(){ if(markers[p.id]) markers[p.id].openPopup(); }, 1400);
    closeModal();
    toast('✦ '+p.city+' aggiunta alla mappa!');
  });

  /* INIT */
  places.forEach(function(p){ addMark(p); });
  stats();

})();
</script>
</body>
</html>
