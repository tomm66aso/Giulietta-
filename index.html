<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wayfarer — Your World, Your Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8;--ink:#1a1612;--ink-soft:#4a3f35;
  --gold:#c9a84c;--gold-light:#e8d5a3;
  --visited:#2d6a4f;--visited-light:#52b788;
  --lived:#9b2226;--lived-light:#e63946;
  --wishlist:#1d3557;--wishlist-light:#457b9d;
  --shadow:0 8px 40px rgba(26,22,18,.18);
  --r:14px;--tr:.3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--ink);overflow:hidden}

.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:rgba(245,240,232,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.25)}
.logo{display:flex;align-items:center;gap:8px}
.logo-star{color:var(--gold);font-size:17px;display:inline-block;animation:spin 9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.nav{display:flex;gap:9px;align-items:center}
.btn-g{background:none;border:1px solid rgba(26,22,18,.2);padding:7px 16px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--ink-soft);transition:var(--tr)}
.btn-g:hover{border-color:var(--gold);color:var(--gold)}
.btn-p{background:var(--ink);color:var(--cream);border:none;padding:7px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr)}
.btn-p:hover{background:var(--gold)}

#map{position:fixed;inset:0;top:54px;z-index:0}
.leaflet-tile{filter:sepia(25%) saturate(.9) brightness(.97)}

.legend{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:4px;background:rgba(245,240,232,.94);backdrop-filter:blur(12px);padding:7px 14px;border-radius:100px;border:1px solid rgba(201,168,76,.25);box-shadow:0 4px 20px rgba(26,22,18,.12)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--ink-soft);padding:4px 9px;border-radius:100px;cursor:pointer;transition:var(--tr);user-select:none}
.leg-item:hover,.leg-item.active{background:var(--ink);color:var(--cream)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-all{background:var(--gold)}.d-visited{background:var(--visited-light)}.d-lived{background:var(--lived-light)}.d-wishlist{background:var(--wishlist-light)}

.panel{position:fixed;top:54px;right:0;bottom:0;width:320px;z-index:900;background:rgba(245,240,232,.97);backdrop-filter:blur(20px);border-left:1px solid rgba(201,168,76,.2);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform var(--tr);box-shadow:-8px 0 40px rgba(26,22,18,.1)}
.panel.open{transform:translateX(0)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.pt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
.pc{background:none;border:none;font-size:15px;cursor:pointer;color:var(--ink-soft);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.pc:hover{background:rgba(26,22,18,.08)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.sc{background:white;border-radius:11px;padding:16px 14px;border:1px solid rgba(201,168,76,.15);text-align:center}
.sn{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);line-height:1}
.sl{font-size:10px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.pl{display:flex;flex-direction:column;gap:7px}
.pi{display:flex;align-items:center;gap:11px;padding:11px 13px;background:white;border-radius:9px;border:1px solid rgba(201,168,76,.1);cursor:pointer;transition:var(--tr);animation:sIn .3s ease both}
@keyframes sIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.pi:hover{border-color:var(--gold);transform:translateX(-2px)}
.psd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pcity{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcountry{font-size:10px;color:var(--ink-soft);margin-top:1px}
.pdel{background:none;border:none;font-size:11px;cursor:pointer;color:transparent;transition:var(--tr);padding:3px}
.pi:hover .pdel{color:#c0392b}

.mo{position:fixed;inset:0;z-index:2000;background:rgba(26,22,18,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--tr)}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--cream);border-radius:20px;padding:28px;width:420px;max-width:calc(100vw - 28px);box-shadow:var(--shadow);transform:translateY(18px) scale(.97);transition:transform var(--tr);max-height:calc(100vh - 56px);overflow-y:auto}
.mo.open .modal{transform:translateY(0) scale(1)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
.mc{background:none;border:none;font-size:15px;cursor:pointer;color:var(--ink-soft);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.mc:hover{background:rgba(26,22,18,.08)}

.sw{position:relative;margin-bottom:14px}
.ci{width:100%;padding:11px 15px;border:2px solid rgba(26,22,18,.12);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;background:white;color:var(--ink);outline:none;transition:border-color var(--tr)}
.ci:focus{border-color:var(--gold)}
.ci::placeholder{color:rgba(74,63,53,.45)}
.sr{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border-radius:9px;box-shadow:var(--shadow);z-index:100;max-height:200px;overflow-y:auto;border:1px solid rgba(201,168,76,.2);display:none}
.sri{padding:11px 15px;cursor:pointer;border-bottom:1px solid rgba(26,22,18,.06);transition:background var(--tr)}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--gold-light)}
.rc{font-size:13px;font-weight:500;color:var(--ink)}
.rco{font-size:11px;color:var(--ink-soft);margin-top:2px}

.sp{display:flex;align-items:center;justify-content:space-between;background:white;border:2px solid var(--gold);border-radius:var(--r);padding:11px 15px;margin-bottom:14px;animation:pIn .22s ease}
@keyframes pIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.sc2{font-size:15px;font-weight:600;color:var(--ink)}
.sco{font-size:11px;color:var(--ink-soft);margin-top:2px}
.cs{background:none;border:none;font-size:13px;cursor:pointer;color:var(--ink-soft);padding:3px;transition:var(--tr)}
.cs:hover{color:var(--lived-light)}

.pkl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:8px}
.so{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sopt{display:flex;flex-direction:column;align-items:center;padding:13px 6px;border-radius:11px;border:2px solid rgba(26,22,18,.1);cursor:pointer;transition:var(--tr);background:white;text-align:center}
.sopt input{display:none}
.sopt:hover{border-color:var(--gold)}
.sopt[data-s="visited"]:has(input:checked){border-color:var(--visited);background:rgba(45,106,79,.08)}
.sopt[data-s="lived"]:has(input:checked){border-color:var(--lived);background:rgba(155,34,38,.08)}
.sopt[data-s="wishlist"]:has(input:checked){border-color:var(--wishlist);background:rgba(29,53,87,.08)}
.si{font-size:20px;margin-bottom:5px}
.sn2{font-size:11px;font-weight:600;color:var(--ink)}
.sd{font-size:9px;color:var(--ink-soft);margin-top:2px}

.nw{margin-bottom:18px}
.ni{width:100%;height:64px;padding:9px 13px;border:2px solid rgba(26,22,18,.1);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);background:white;resize:none;outline:none;transition:border-color var(--tr)}
.ni:focus{border-color:var(--gold)}
.ni::placeholder{color:rgba(74,63,53,.4);font-style:italic}

.bs{width:100%;padding:13px;background:var(--ink);color:var(--cream);border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:var(--tr);letter-spacing:.2px}
.bs:hover{background:var(--gold)}
.bs:active{transform:scale(.98)}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--cream);padding:9px 20px;border-radius:100px;font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:all .28s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.cm{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.mv{background:var(--visited-light)}.ml{background:var(--lived-light)}.mw{background:var(--wishlist-light)}
.leaflet-popup-content-wrapper{background:var(--cream);border-radius:11px;box-shadow:var(--shadow);border:1px solid rgba(201,168,76,.2);font-family:'DM Sans',sans-serif}
.leaflet-popup-tip{background:var(--cream)}
.popc{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.popco{font-size:10px;color:var(--ink-soft)}
.pops{display:inline-block;margin-top:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:100px}
.pop-visited{background:rgba(82,183,136,.15);color:var(--visited)}
.pop-lived{background:rgba(230,57,70,.12);color:var(--lived)}
.pop-wishlist{background:rgba(69,123,157,.12);color:var(--wishlist)}
.popn{margin-top:5px;font-size:10px;font-style:italic;color:var(--ink-soft);max-width:150px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:100px}

@media(max-width:600px){
  .panel{width:100%}
  .modal{padding:22px 18px}
  .legend span:last-child{display:none}
}


/* Globe 3D - sfondo spazio */
#map {
  background: radial-gradient(ellipse at center, #0d1829 0%, #060b16 70%) !important;
}


/* ── SPLASH "pulce ti amo" ── */
#splash{
  position:fixed;inset:0;z-index:99999;
  background:#060b16;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .8s ease;
}
#splash.hide{opacity:0;pointer-events:none}
#splash .pulce{
  font-family:'Playfair Display',serif;
  font-size:clamp(38px,9vw,76px);
  font-weight:700;font-style:italic;
  color:#c9a84c;
  letter-spacing:-1px;
  animation:pulceIn 1.1s cubic-bezier(.2,.7,.2,1) both;
  text-align:center;
}
#splash .pulce span{
  display:inline-block;
  animation:heart 1.4s ease-in-out infinite;
  font-style:normal;
}
.pulce-sub{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(14px,3vw,20px);
  color:rgba(245,240,232,.45);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:12px;
  animation:pulceIn 1.4s cubic-bezier(.2,.7,.2,1) .3s both;
  text-align:center;
}
@keyframes pulceIn{
  0%{opacity:0;transform:scale(.7) translateY(20px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes heart{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.25)}
}

/* ── CANVAS FUOCHI D'ARTIFICIO ── */
#fireworks-canvas{
  position:fixed;inset:0;z-index:99998;pointer-events:none;
  opacity:0;transition:opacity .3s ease;
}
#fireworks-canvas.show{opacity:1}

/* ── STATS AVANZATE ── */
.stats-section-title{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:1px;color:var(--ink-soft);
  margin:18px 0 10px;padding-bottom:6px;
  border-bottom:1px solid rgba(201,168,76,.2);
}
.continent-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid rgba(26,22,18,.06);
}
.continent-row:last-child{border-bottom:none}
.continent-name{font-size:12px;font-weight:500;color:var(--ink)}
.continent-count{font-size:11px;color:var(--ink-soft)}
.continent-bar-wrap{flex:1;margin:0 10px;height:4px;background:rgba(26,22,18,.08);border-radius:100px;overflow:hidden}
.continent-bar{height:100%;background:var(--gold);border-radius:100px;transition:width .6s ease}
.world-pct-card{
  background:linear-gradient(135deg,var(--ink) 0%,#2a2018 100%);
  border-radius:12px;padding:16px;margin-bottom:6px;
  display:flex;align-items:center;gap:14px;
}
.world-pct-number{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--gold);line-height:1}
.world-pct-label{font-size:12px;color:rgba(245,240,232,.6);margin-top:3px}
.globe-icon{font-size:32px}

/* ── RATING STELLE ── */
.rating-wrap{margin-bottom:14px}
.rating-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:8px}
.stars{display:flex;gap:4px}
.star{font-size:22px;cursor:pointer;transition:transform .15s ease;filter:grayscale(1) opacity(.3)}
.star.active,.star:hover{filter:none;transform:scale(1.15)}
.star:hover ~ .star{filter:grayscale(1) opacity(.3);transform:scale(1)}
.pi-stars{font-size:11px;letter-spacing:1px}

/* ── LOGIN SCREEN ── */
#login-screen{
  position:fixed;inset:0;z-index:99990;
  background:#060b16;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
#login-screen.hide{display:none}
.login-box{
  background:rgba(245,240,232,.04);
  border:1px solid rgba(201,168,76,.2);
  border-radius:24px;padding:40px 36px;
  width:360px;max-width:calc(100vw - 32px);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
  display:flex;flex-direction:column;gap:16px;
}
.login-logo{text-align:center;margin-bottom:8px}
.login-logo-star{font-size:32px;color:#c9a84c;display:inline-block;animation:spin 9s linear infinite}
.login-logo-text{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#f5f0e8;display:block;margin-top:6px}
.login-sub{font-size:12px;color:rgba(245,240,232,.35);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.login-input{
  width:100%;padding:12px 16px;
  border:2px solid rgba(245,240,232,.1);border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  background:rgba(245,240,232,.05);color:#f5f0e8;
  outline:none;transition:border-color .2s ease;
}
.login-input:focus{border-color:#c9a84c}
.login-input::placeholder{color:rgba(245,240,232,.25)}
.login-btn{
  width:100%;padding:13px;
  background:#c9a84c;color:#1a1612;
  border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s ease;margin-top:4px;
}
.login-btn:hover{background:#f5f0e8}
.login-btn:active{transform:scale(.98)}
.login-err{color:#e63946;font-size:12px;text-align:center;min-height:16px}
.login-loading{color:rgba(245,240,232,.4);font-size:12px;text-align:center}

/* ── PHOTO UPLOAD in modal ── */
.photo-wrap{margin-bottom:14px}
.photo-label-txt{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft);margin-bottom:8px}
.photo-drop{
  border:2px dashed rgba(201,168,76,.3);border-radius:12px;
  padding:20px;text-align:center;cursor:pointer;
  transition:.2s ease;position:relative;
  background:rgba(201,168,76,.03);
}
.photo-drop:hover{border-color:var(--gold);background:rgba(201,168,76,.06)}
.photo-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop-icon{font-size:24px;margin-bottom:6px}
.photo-drop-txt{font-size:12px;color:var(--ink-soft)}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.photo-thumb{
  width:64px;height:64px;border-radius:8px;
  object-fit:cover;border:2px solid rgba(201,168,76,.2);
  position:relative;
}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb-del{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:#e63946;color:white;border:none;
  font-size:10px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  font-weight:700;
}

/* ── PHOTO VIEWER modal ── */
#photo-viewer{
  position:fixed;inset:0;z-index:3000;
  background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
#photo-viewer.open{opacity:1;pointer-events:all}
#photo-viewer img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
#photo-viewer-close{
  position:absolute;top:20px;right:24px;
  background:none;border:none;color:white;font-size:28px;cursor:pointer;
}
#photo-viewer-caption{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.7);font-size:13px;font-style:italic;
}

/* ── FOTO NELLA LISTA POSTI ── */
.pi-photos{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.pi-photo-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid rgba(201,168,76,.2);transition:.15s ease}
.pi-photo-thumb:hover{transform:scale(1.08);border-color:var(--gold)}

/* ── LOGOUT BTN ── */
.btn-logout{
  background:none;border:1px solid rgba(245,240,232,.15);
  padding:7px 14px;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  cursor:pointer;color:rgba(245,240,232,.5);
  transition:.2s ease;
}
.btn-logout:hover{border-color:#e63946;color:#e63946}
</style>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-star">✦</span>
      <span class="login-logo-text">Wayfarer</span>
    </div>
    <p class="login-sub">Your World, Your Story</p>
    <input type="email" id="login-email" class="login-input" placeholder="Email" value="g6629329@gmail.com"/>
    <input type="password" id="login-pwd" class="login-input" placeholder="Password"/>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" id="login-btn">Enter</button>
  </div>
</div>

<div id="photo-viewer">
  <button id="photo-viewer-close">✕</button>
  <img id="photo-viewer-img" src="" alt=""/>
  <div id="photo-viewer-caption"></div>
</div>

<canvas id="fireworks-canvas"></canvas>
<div id="splash"><div class="pulce">pulce ti amo <span>❤️</span></div><div class="pulce-sub">il mondo è nostro</div></div>
<header class="hdr">
  <div class="logo">
    <span class="logo-star">✦</span>
    <span class="logo-text">Wayfarer</span>
  </div>
  <div class="nav">
    <button class="btn-g" id="btn-stats">Stats</button>
    <button class="btn-p" id="btn-add">+ Add Place</button>
    <button class="btn-logout" id="btn-logout">Logout</button>
  </div>
</header>
<div id="map"></div>
<div class="legend">
  <div class="leg-item active" data-f="all"><span class="leg-dot d-all"></span><span>All</span></div>
  <div class="leg-item" data-f="visited"><span class="leg-dot d-visited"></span><span>Visited</span></div>
  <div class="leg-item" data-f="lived"><span class="leg-dot d-lived"></span><span>Lived</span></div>
  <div class="leg-item" data-f="wishlist"><span class="leg-dot d-wishlist"></span><span>Wishlist</span></div>
</div>
<div class="panel" id="panel">

async function tryLogin(){

async function loadPlaces(){
  const { data, error } = await supa
    .from('places')
    .select('*, place_photos(id,url,caption)')
    .order('added_at',{ ascending:true });
  if(error){ console.error(error); return; }
  places = (data||[]).map(r=>({
    id: r.id, city: r.city, country: r.country, state: r.state||'',
    lat: r.lat, lng: r.lng, status: r.status,
    rating: r.rating||0, notes: r.notes||'',
    addedAt: r.added_at, photos: r.place_photos||[]
  }));
}

async function savePlace(p){
  const { data, error } = await supa.from('places').insert({
    user_id: currentUser.id, city: p.city, country: p.country, state: p.state,
    lat: p.lat, lng: p.lng, status: p.status, rating: p.rating, notes: p.notes
  }).select().single();
  if(error){ console.error(error); return null; }
  return data;
}

async function deletePlace(id){
  await supa.from('places').delete().eq('id',id);
}

async function uploadPhotos(placeId, files){
  const uploaded=[];
  for(const file of files){
    const ext  = file.name.split('.').pop();
    const path = currentUser.id+'/'+placeId+'/'+Date.now()+'.'+ext;
    const { error:upErr } = await supa.storage.from('place-photos').upload(path,file);
    if(upErr){ console.error(upErr); continue; }
    const { data:urlData } = supa.storage.from('place-photos').getPublicUrl(path);
    const { data:row } = await supa.from('place_photos').insert({
      place_id:placeId, user_id:currentUser.id, url:urlData.publicUrl, caption:''
    }).select().single();
    if(row) uploaded.push({ id:row.id, url:row.url, caption:'' });
  }
  return uploaded;
}

const CONTINENT_MAP = {
  'Europe':['Italy','France','Spain','Germany','Portugal','Netherlands','Belgium','Switzerland','Austria','Greece','Poland','Czech Republic','Hungary','Romania','Sweden','Norway','Denmark','Finland','Croatia','Serbia','Bulgaria','Slovakia','Slovenia','Estonia','Latvia','Lithuania','Luxembourg','Malta','Cyprus','Ireland','United Kingdom','Albania','Bosnia and Herzegovina','Montenegro','North Macedonia','Moldova','Ukraine','Russia'],
  'Asia':['China','Japan','India','South Korea','Thailand','Vietnam','Indonesia','Malaysia','Singapore','Philippines','Taiwan','Bangladesh','Pakistan','Nepal','Sri Lanka','Myanmar','Cambodia','Laos','Mongolia','Kazakhstan','Uzbekistan','Georgia','Armenia','Turkey'],
  'Americas':['United States','Canada','Mexico','Brazil','Argentina','Colombia','Chile','Peru','Venezuela','Ecuador','Bolivia','Uruguay','Paraguay','Cuba','Dominican Republic','Guatemala','Honduras','Costa Rica','Panama','Jamaica'],
  'Africa':['South Africa','Egypt','Nigeria','Kenya','Morocco','Ethiopia','Ghana','Tanzania','Uganda','Mozambique','Cameroon','Zimbabwe','Zambia','Senegal','Tunisia','Algeria','Rwanda'],
  'Oceania':['Australia','New Zealand','Fiji','Papua New Guinea','Samoa'],
  'Middle East':['UAE','Saudi Arabia','Qatar','Kuwait','Bahrain','Oman','Iraq','Iran','Israel','Jordan','Lebanon']
};
const TOTAL_COUNTRIES = 195;

function getContinent(country){
  for(const [c,arr] of Object.entries(CONTINENT_MAP)) if(arr.includes(country)) return c;
  return 'Other';
}

function updateStats(){
  const c = new Set(places.map(p=>p.country));
  $('s-cities').textContent    = places.length;
  $('s-countries').textContent = c.size;
  $('s-visited').textContent   = places.filter(p=>p.status==='visited'||p.status==='lived').length;
  $('s-wish').textContent      = places.filter(p=>p.status==='wishlist').length;

  const visited = new Set(places.filter(p=>p.status==='visited'||p.status==='lived').map(p=>p.country));
  const pct = Math.round(visited.size/TOTAL_COUNTRIES*1000)/10;
  $('world-pct').textContent = pct+'%';

  const contMap={};
  places.filter(p=>p.status==='visited'||p.status==='lived').forEach(p=>{
    const cont=getContinent(p.country);
    if(!contMap[cont]) contMap[cont]=new Set();
    contMap[cont].add(p.country);
  });
  const allConts=['Europe','Asia','Americas','Africa','Oceania','Middle East','Other'];
  const maxCount=Math.max(1,...Object.values(contMap).map(s=>s.size));
  const cl=$('continents-list'); cl.innerHTML='';
  allConts.forEach(cont=>{
    const count=contMap[cont]?contMap[cont].size:0;
    if(!count) return;
    const row=document.createElement('div'); row.className='continent-row';
    row.innerHTML=`<span class="continent-name">${cont}</span>
      <div class="continent-bar-wrap"><div class="continent-bar" style="width:${Math.round(count/maxCount*100)}%"></div></div>
      <span class="continent-count">${count}</span>`;
    cl.appendChild(row);
  });
  if(!cl.children.length) cl.innerHTML='<p style="font-size:12px;color:var(--ink-soft);padding:8px 0;font-style:italic">Add visited places to see</p>';
}

// ══════════════════════════════════════════════════════
//  RENDER LIST
// ══════════════════════════════════════════════════════
function renderList(){
  const pl=$('plist'); pl.innerHTML='';
  const arr=activeFilter==='all'?places:places.filter(p=>p.status===activeFilter);
  if(!arr.length){ pl.innerHTML='<p style="text-align:center;color:#9a8e84;font-size:12px;padding:18px 0;font-style:italic">No places yet…</p>'; return; }
  arr.forEach((p,i)=>{
    const d=document.createElement('div'); d.className='pi'; d.style.animationDelay=`${i*35}ms`;
    const photosHtml=(p.photos&&p.photos.length)
      ?'<div class="pi-photos">'+p.photos.map(ph=>`<img class="pi-photo-thumb" src="${ph.url}" data-url="${ph.url}" data-caption="${ph.caption||''}" />`).join('')+'</div>'
      :'';
    d.innerHTML=`<span class="psd" style="background:${color(p.status)}"></span>
      <div class="pinfo">
        <div class="pcity">${p.city}${p.rating?` <span style="color:var(--gold);font-size:10px">${starsHTML(p.rating)}</span>`:''}</div>
        <div class="pcountry">${p.country} · <em>${p.status}</em></div>
        ${photosHtml}
      </div>
      <button class="pdel">✕</button>`;
    d.querySelectorAll('.pi-photo-thumb').forEach(img=>{
      img.addEventListener('click',e=>{ e.stopPropagation(); openPhotoViewer(img.dataset.url,img.dataset.caption); });
    });
    d.addEventListener('click',e=>{
      if(e.target.classList.contains('pdel')||e.target.classList.contains('pi-photo-thumb')) return;
      globe.controls().autoRotate=false;
      globe.pointOfView({lat:p.lat,lng:p.lng,altitude:1.5},900);
    });
    d.querySelector('.pdel').addEventListener('click',async e=>{
      e.stopPropagation();
      await deletePlace(p.id);
      places=places.filter(x=>x.id!==p.id);
      renderGlobe(); updateStats(); renderList();
      showToast('Place removed');
    });
    pl.appendChild(d);
  });
}

async function searchCity(q){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&featuretype=city&addressdetails=1&accept-language=en`,{headers:{'Accept-Language':'en'}});
    const data=await res.json();
    const sr=$('sr'); sr.innerHTML='';
    if(!data.length){ sr.innerHTML='<div class="sri"><div class="rc">No results</div></div>'; sr.style.display='block'; return; }
    data.forEach(item=>{
      const a=item.address||{};
      const city=a.city||a.town||a.village||a.municipality||item.display_name.split(',')[0];
      const state=a.state||''; const country=a.country||'';
      const label=state?`${state}, ${country}`:country;
      const d=document.createElement('div'); d.className='sri';
      d.innerHTML=`<div class="rc">${city}</div><div class="rco">${label}</div>`;
      d.addEventListener('click',()=>{
        sel={city,country,state,lat:parseFloat(item.lat),lng:parseFloat(item.lon)};
        $('sel-city').textContent=city;
        $('sel-country').textContent=label;
        $('selp').style.display='flex'; sr.style.display='none';
        $('ci').value=''; $('ci').style.display='none';
      });
      sr.appendChild(d);
    });
    sr.style.display='block';
  }catch(e){ $('sr').innerHTML='<div class="sri"><div class="rc">Connection error</div></div>'; $('sr').style.display='block'; }
}

// ══════════════════════════════════════════════════════
$('save').addEventListener('click', async ()=>{
  if(!sel){ showToast('Please select a city first'); return; }
  const st=document.querySelector('input[name="st"]:checked');
  if(!st){ showToast('Choose a status first'); return; }
  if(places.find(p=>p.city===sel.city&&p.country===sel.country)){ showToast(`${sel.city} is already on your map!`); return; }

  const btn=$('save'); btn.textContent='Saving…'; btn.disabled=true;

  const saved=await savePlace({
    city:sel.city, country:sel.country, state:sel.state||'',
    lat:sel.lat, lng:sel.lng, status:st.value,
    rating:currentRating, notes:$('notes').value.trim()
  });
  if(!saved){ showToast('Error saving — try again'); btn.textContent='Save Place'; btn.disabled=false; return; }

  let photos=[];
  if(pendingPhotos.length>0) photos=await uploadPhotos(saved.id, pendingPhotos);

  const p={ id:saved.id, city:sel.city, country:sel.country, state:sel.state||'',
    lat:sel.lat, lng:sel.lng, status:st.value, rating:currentRating,
    notes:$('notes').value.trim(), addedAt:saved.added_at, photos };
  places.push(p);

  btn.textContent='Save Place'; btn.disabled=false;
  renderGlobe(); updateStats(); renderList();
  globe.controls().autoRotate=false;
  globe.pointOfView({lat:p.lat,lng:p.lng,altitude:1.8},1000);
  closeModal();
  showToast(`✦ ${p.city} added to your map!`);
  triggerFireworks();
});

const canvas=$('fireworks-canvas');
const ctx=canvas.getContext('2d');
let particles=[], fwId=null;

function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize',resizeCanvas);

function launchFirework(){
  const x=window.innerWidth*0.2+Math.random()*window.innerWidth*0.6;
  const y=window.innerHeight*0.15+Math.random()*window.innerHeight*0.4;
  const colors=['#c9a84c','#f5f0e8','#52b788','#e63946','#457b9d','#ffd700','#ff6b9d'];
  const col=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<80;i++){
    const angle=(Math.PI*2/80)*i+Math.random()*0.2;
    const speed=2+Math.random()*8;
    particles.push({ x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      alpha:1,color:col,radius:1.5+Math.random()*3,
      decay:0.012+Math.random()*0.018,gravity:0.1 });
  }
}

function animateFireworks(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>0.01);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.98; p.alpha-=p.decay;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
  });
  if(particles.length>0) fwId=requestAnimationFrame(animateFireworks);
  else canvas.classList.remove('show');
}

function triggerFireworks(){
  canvas.classList.add('show'); particles=[];
  if(fwId) cancelAnimationFrame(fwId);
  launchFirework();
  setTimeout(launchFirework,250);
  setTimeout(launchFirework,500);
  fwId=requestAnimationFrame(animateFireworks);
}
